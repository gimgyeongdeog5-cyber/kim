<!-- SOUND AND SYNTH ENGINE SCRIPT -->
<script>
// --- Web Audio API 기반 오디오 및 레트로 배경음 합성기 ---
const AudioEngine = {
    ctx: null,
    muted: false,
    bgmEnabled: false,
    bgmInterval: null,
    bgmStep: 0,

    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },

    toggleMute() {
        this.muted = !this.muted;
        return this.muted;
    },

    toggleBGM() {
        this.init();
        this.bgmEnabled = !this.bgmEnabled;
        if (this.bgmEnabled) {
            this.startBGM();
        } else {
            this.stopBGM();
        }
        return this.bgmEnabled;
    },

    // 소리 합성 보조 함수
    playTone(freq, type, duration, gainStart) {
        if (this.muted) return;
        this.init();

        try {
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gainNode = this.ctx.createGain();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, t);

            gainNode.gain.setValueAtTime(gainStart, t);
            gainNode.gain.exponentialRampToValueAtTime(0.001, t + duration);

            osc.connect(gainNode);
            gainNode.connect(this.ctx.destination);

            osc.start(t);
            osc.stop(t + duration);
        } catch (e) {
            console.warn("Audio Context Error: ", e);
        }
    },

    // 효과음: 블록 이동
    playMove() {
        this.playTone(180, 'triangle', 0.08, 0.15);
    },

    // 효과음: 블록 회전
    playRotate() {
        this.playTone(320, 'sine', 0.12, 0.2);
    },

    // 효과음: 바닥 착지 (Soft Drop / Lock down)
    playLock() {
        this.playTone(100, 'triangle', 0.15, 0.3);
    },

    // 효과음: 하드 드롭 타격음
    playHardDrop() {
        this.playTone(80, 'sawtooth', 0.25, 0.45);
        // 추가 고주파 금속성 노이즈
        setTimeout(() => {
            this.playTone(200, 'triangle', 0.1, 0.2);
        }, 30);
    },

    // 효과음: 홀드 큐 교환
    playHold() {
        this.playTone(440, 'sine', 0.15, 0.25);
    },

    // 효과음: 줄 삭제 연출 (클리어 개수별 다채로운 음성)
    playClear(lines) {
        if (this.muted) return;
        this.init();
        const t = this.ctx.currentTime;
        
        let pitches = [];
        if (lines === 4) {
            // 테트리스 완성음 (웅장한 메이저 코드 스윕)
            pitches = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99]; // C - E - G - C - E - G
        } else {
            // 일반 한두 줄 삭제음
            pitches = [330, 440, 550, 660];
        }

        pitches.forEach((p, idx) => {
            setTimeout(() => {
                this.playTone(p, 'sine', 0.25, 0.25);
            }, idx * 70);
        });
    },

    // 효과음: 레벨 업 신호음
    playLevelUp() {
        this.playTone(523.25, 'sawtooth', 0.1, 0.2);
        setTimeout(() => this.playTone(659.25, 'sawtooth', 0.1, 0.2), 80);
        setTimeout(() => this.playTone(783.99, 'sawtooth', 0.15, 0.2), 160);
        setTimeout(() => this.playTone(1046.50, 'sawtooth', 0.3, 0.3), 240);
    },

    // 효과음: 게임오버 패배음
    playGameOver() {
        this.playTone(220, 'sawtooth', 0.3, 0.3);
        setTimeout(() => this.playTone(180, 'sawtooth', 0.4, 0.3), 250);
        setTimeout(() => this.playTone(140, 'sawtooth', 0.6, 0.3), 500);
    },

    // 오리지널 복고풍 테트리스 스타일 BGM 합성 루프
    startBGM() {
        this.stopBGM();
        if (this.muted || !this.bgmEnabled) return;

        // 전통 테트리스 테마 (A-Theme) 변조 아르페지오 멜로디 시퀀스
        const melody = [
            783.99, 587.33, 659.25, 698.46, 587.33, 523.25, 440, 440, 
            523.25, 659.25, 587.33, 523.25, 493.88, 493.88, 523.25, 587.33,
            659.25, 523.25, 440, 440, 0, 587.33, 698.46, 880, 783.99, 
            698.46, 659.25, 523.25, 659.25, 587.33, 523.25, 493.88, 493.88
        ];
        
        let tempo = 150; // ms per beat

        this.bgmStep = 0;
        this.bgmInterval = setInterval(() => {
            if (this.muted || !this.bgmEnabled) {
                this.stopBGM();
                return;
            }

            const freq = melody[this.bgmStep];
            if (freq > 0) {
                // 부드러운 삼각파 백그라운드 멜로디
                this.playTone(freq, 'triangle', 0.16, 0.05);
            }

            this.bgmStep = (this.bgmStep + 1) % melody.length;
        }, tempo);
    },

    stopBGM() {
        if (this.bgmInterval) {
            clearInterval(this.bgmInterval);
            this.bgmInterval = null;
        }
    }
};
</script>

    score: 0,
    level: 1,
    lines: 0,
    
    currentPiece: null,
    nextPieces: [],
    holdPiece: null,
    hasHeld: false,

    gameOver: false,
    paused: false,
    
    dropCounter: 0,
    dropInterval: 1000, // Level 1 기본 하강 간격 (ms)
    lastTime: 0
};

// 캔버스 객체 정보들
const boardCanvas = document.getElementById('canvas-board');
const boardCtx = boardCanvas.getContext('2d');
const holdCanvas = document.getElementById('canvas-hold');
const holdCtx = holdCanvas.getContext('2d');

const nextCanvas1 = document.getElementById('canvas-next-1');
const nextCtx1 = nextCanvas1.getContext('2d');
const nextCanvas2 = document.getElementById('canvas-next-2');
const nextCtx2 = nextCanvas2.getContext('2d');
const nextCanvas3 = document.getElementById('canvas-next-3');
const nextCtx3 = nextCanvas3.getContext('2d');

// 모바일 해상도/크기 대응 캔버스 리사이즈
function resizeCanvas() {
    const container = document.getElementById('board-container');
    const width = container.clientWidth;
    const height = container.clientHeight;
    
    // 블러링 현상을 줄이기 위해 디바이스 픽셀 비율 적용 
    const dpr = window.devicePixelRatio || 1;
    boardCanvas.width = width * dpr;
    boardCanvas.height = height * dpr;
    boardCtx.scale(dpr, dpr);
}

window.addEventListener('resize', () => {
    resizeCanvas();
    drawAll();
});

// 무작위 랜덤 백 수급 방식 (7-Bag System: 테트리스 표준 규칙)
let pieceBag = [];
function getNextPieceType() {
    if (pieceBag.length === 0) {
        pieceBag = Object.keys(SHAPES);
        // Fisher-Yates 셔플 알고리즘
        for (let i = pieceBag.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pieceBag[i], pieceBag[j]] = [pieceBag[j], pieceBag[i]];
        }
    }
    return pieceBag.pop();
}

// 다음 조각 큐 풀 보장 및 생성
function fillNextQueue() {
    while (GameState.nextPieces.length < 4) {
        GameState.nextPieces.push(getNextPieceType());
    }
}

// 새 조각 소환
function spawnNewPiece() {
    fillNextQueue();
    const nextType = GameState.nextPieces.shift();
    fillNextQueue();

    GameState.currentPiece = {
        type: nextType,
        matrix: JSON.parse(JSON.stringify(SHAPES[nextType].matrix)),
        color: SHAPES[nextType].color,
        glow: SHAPES[nextType].glow,
        x: Math.floor((COLS - SHAPES[nextType].matrix[0].length) / 2),
        y: nextType === 'I' ? -1 : 0 // I 블록 스폰 높이 미세 보정
    };

    // 스폰하자마자 충돌하면 게임 오버
    if (checkCollision(GameState.currentPiece, 0, 0)) {
        triggerGameOver();
    }
}

// 보드 초기화
function initBoard() {
    GameState.board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
}

// 충돌 감지 공식
function checkCollision(piece, offsetX, offsetY, testMatrix = null) {
    const matrix = testMatrix || piece.matrix;
    for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[r].length; c++) {
            if (matrix[r][c] !== 0) {
                const nextX = piece.x + c + offsetX;
                const nextY = piece.y + r + offsetY;

                // 벽 바깥 경계 검증
                if (nextX < 0 || nextX >= COLS || nextY >= ROWS) {
                    return true;
                }
                // 바닥 안쪽 블록들과의 연산 검증
                if (nextY >= 0 && GameState.board[nextY][nextX] !== 0) {
                    return true;
                }
            }
        }
    }
    return false;
}

// 가로방향 이동
function moveHorizontal(dir) {
    if (GameState.gameOver || GameState.paused) return;
    if (!checkCollision(GameState.currentPiece, dir, 0)) {
        GameState.currentPiece.x += dir;
        AudioEngine.playMove();
        drawAll();
    }
}

// 아래방향 한 칸 이동 (소프트드롭 포함)
function moveVertical() {
    if (GameState.gameOver || GameState.paused) return false;
    
    if (!checkCollision(GameState.currentPiece, 0, 1)) {
        GameState.currentPiece.y += 1;
        GameState.dropCounter = 0; // 하강 즉시 리셋해 조작 수월성 확보
        drawAll();
        return true;
    }
    
    // 더이상 못내려갈 시 병합 고정
    lockPiece();
    return false;
}

// 회전 기능 (SRS 벽차기 예외규정 적용)
function rotatePiece(dir) {
    if (GameState.gameOver || GameState.paused) return;
    const piece = GameState.currentPiece;
    const size = piece.matrix.length;
    let tempMatrix = Array.from({ length: size }, () => Array(size).fill(0));

    // 회전 행렬 전치
    if (dir === 1) { // 시계방향
        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                tempMatrix[c][size - 1 - r] = piece.matrix[r][c];
            }
        }
    } else { // 반시계방향
        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                tempMatrix[size - 1 - c][r] = piece.matrix[r][c];
            }
        }
    }

    // 벽 충돌 시 탈출하는 보정 기법 (오프셋 킥)
    const kicks = [0, -1, 1, -2, 2];
    for (let kick of kicks) {
        if (!checkCollision(piece, kick, 0, tempMatrix)) {
            piece.matrix = tempMatrix;
            piece.x += kick;
            AudioEngine.playRotate();
            drawAll();
            break;
        }
    }
}

// 하드 드롭 단숨 낙하
function hardDrop() {
    if (GameState.gameOver || GameState.paused) return;
    let dropDist = 0;
    while (!checkCollision(GameState.currentPiece, 0, 1)) {
        GameState.currentPiece.y += 1;
        dropDist++;
    }
    
    // 점수 보너스 가중치
    GameState.score += dropDist * 2;
    document.getElementById('stat-score').innerText = GameState.score;

    AudioEngine.playHardDrop();
    triggerScreenShake();
    
    lockPiece();
}

// 홀드 기능 (피스 스왑)
function triggerHold() {
    if (GameState.gameOver || GameState.paused || GameState.hasHeld) return;

    AudioEngine.playHold();
    
    const temp = GameState.holdPiece;
    GameState.holdPiece = GameState.currentPiece.type;

    if (temp === null) {
        // 첫 홀드이면 바로 다음 소환
        spawnNewPiece();
    } else {
        // 기존 홀드 내용물 교환 후 원상복구
        GameState.currentPiece = {
            type: temp,
            matrix: JSON.parse(JSON.stringify(SHAPES[temp].matrix)),
            color: SHAPES[temp].color,
            glow: SHAPES[temp].glow,
            x: Math.floor((COLS - SHAPES[temp].matrix[0].length) / 2),
            y: temp === 'I' ? -1 : 0
        };
    }
    GameState.hasHeld = true; // 소거 전까진 재사용 금지 규칙
    drawAll();
}

// 바닥 고정 후 연쇄 소멸 확인
function lockPiece() {
    const piece = GameState.currentPiece;
    for (let r = 0; r < piece.matrix.length; r++) {
        for (let c = 0; c < piece.matrix[r].length; c++) {
            if (piece.matrix[r][c] !== 0) {
                const boardY = piece.y + r;
                const boardX = piece.x + c;

                // 스크린 외곽 초과 스택은 스폰 시 체크로 걸러졌으나 안전장치 마련
                if (boardY >= 0) {
                    GameState.board[boardY][boardX] = {
                        color: piece.color,
                        glow: piece.glow
                    };
                }
            }
        }
    }

    AudioEngine.playLock();
    
    // 소거 라인 조사
    checkAndClearLines();
    
    // 새로운 조각 턴 전환
    GameState.hasHeld = false;
    spawnNewPiece();
    drawAll();
}

// 소멸 라인 조사 및 화면 파티클 이펙트
function checkAndClearLines() {
    let clearedLines = 0;
    
    for (let r = ROWS - 1; r >= 0; r--) {
        const isLineFull = GameState.board[r].every(cell => cell !== 0);
        if (isLineFull) {
            clearedLines++;
            
            // 파티클 스파크 대거 방출 연출
            for (let c = 0; c < COLS; c++) {
                const cellColor = GameState.board[r][c].color;
                createLineParticles(c, r, cellColor);
            }

            // 라인 도출 후 위쪽 스택 순차 낙하
            GameState.board.splice(r, 1);
            GameState.board.unshift(Array(COLS).fill(0));
            r++; // 인덱스 역방향이므로 다시 한 줄 유지
        }
    }

    if (clearedLines > 0) {
        // 전통 테트리스 스코어 배수 가산법
        const rewards = [0, 100, 300, 500, 800];
        let scoreGain = rewards[clearedLines] * GameState.level;
        
        // 4줄 동시 폭파 "TETRIS" 특별 점수 보너스
        if (clearedLines === 4) {
            scoreGain += 400 * GameState.level; // 추가 뽀찌
            showScorePopup("💥 TETRIS!! 💥");
            triggerScreenShake(12);
        } else {
            showScorePopup(`+${scoreGain}`);
        }

        GameState.score += scoreGain;
        GameState.lines += clearedLines;

        // 레벨업 트리거 (10줄 돌파 마다)
        const nextLevelThreshold = Math.floor(GameState.lines / 10) + 1;
        if (nextLevelThreshold > GameState.level) {
            GameState.level = nextLevelThreshold;
            AudioEngine.playLevelUp();
            // 스피드 레벨업 계산 (점차 빨라짐)
            GameState.dropInterval = Math.max(100, 1000 - (GameState.level - 1) * 100);
        } else {
            AudioEngine.playClear(clearedLines);
        }

        // 스탯 갱신
        document.getElementById('stat-score').innerText = GameState.score;
        document.getElementById('stat-level').innerText = GameState.level;
        document.getElementById('stat-lines').innerText = GameState.lines;
    }
}

// 줄 소멸 스코어 팝업 띄우기
function showScorePopup(text) {
    const popup = document.getElementById('score-popup');
    popup.innerText = text;
    popup.style.transform = 'scale(1.2)';
    popup.style.opacity = '1';
    
    setTimeout(() => {
        popup.style.transform = 'scale(0.8)';
        popup.style.opacity = '0';
    }, 1000);
}

// 화면 흔들림 효과 유발
function triggerScreenShake(intensity = 6) {
    const app = document.getElementById('board-container');
    app.style.transform = `translate(${(Math.random() - 0.5) * intensity}px, ${(Math.random() - 0.5) * intensity}px)`;
    setTimeout(() => {
        app.style.transform = 'none';
    }, 150);
}

// 파티클 정보 삽입
function createLineParticles(gridX, gridY, color) {
    const container = document.getElementById('board-container');
    const blockWidth = container.clientWidth / COLS;
    const blockHeight = container.clientHeight / ROWS;

    // 격자 좌표에서 실제 캔버스 내부 절대좌표 추출
    const realX = gridX * blockWidth + blockWidth / 2;
    const realY = gridY * blockHeight + blockHeight / 2;

    for (let i = 0; i < 8; i++) {
        particles.push({
            x: realX,
            y: realY,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8 - 3, // 약간 위로 튀게
            radius: Math.random() * 3 + 1,
            color: color,
            alpha: 1,
            decay: Math.random() * 0.03 + 0.02
        });
    }
}

// 고스트 피스 낙하 종점 추출 기능
function getGhostY() {
    const piece = GameState.currentPiece;
    let ghostY = piece.y;
    while (!checkCollision(piece, 0, ghostY - piece.y + 1)) {
        ghostY++;
    }
    return ghostY;
}

// 캔버스 종합 리렌더러
function drawAll() {
    const w = boardCanvas.width / (window.devicePixelRatio || 1);
    const h = boardCanvas.height / (window.devicePixelRatio || 1);
    const blockW = w / COLS;
    const blockH = h / ROWS;

    // 1. 메인 판 배경 클리어
    boardCtx.clearRect(0, 0, w, h);
    boardCtx.fillStyle = '#050314';
    boardCtx.fillRect(0, 0, w, h);

    // 2. 가로/세로 가이드 눈금선 그리기 (디지털 사이버 스타일)
    boardCtx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
    boardCtx.lineWidth = 1;
    for (let i = 1; i < COLS; i++) {
        boardCtx.beginPath();
        boardCtx.moveTo(i * blockW, 0);
        boardCtx.lineTo(i * blockW, h);
        boardCtx.stroke();
    }
    for (let j = 1; j < ROWS; j++) {
        boardCtx.beginPath();
        boardCtx.moveTo(0, j * blockH);
        boardCtx.lineTo(w, j * blockH);
        boardCtx.stroke();
    }

    // 3. 고착된 보드판 블록들 그리기
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = GameState.board[r][c];
            if (cell !== 0) {
                drawNeonBlock(boardCtx, c * blockW, r * blockH, blockW, blockH, cell.color, cell.glow);
            }
        }
    }

    // 4. 고스트 피스(바닥 착지 예정지 선) 렌더링
    if (GameState.currentPiece) {
        const ghostY = getGhostY();
        // 실제 피스가 이미 낙하지점이라면 그리지 않음
        if (ghostY > GameState.currentPiece.y) {
            boardCtx.save();
            boardCtx.globalAlpha = 0.23; // 반투명 연출
            const piece = GameState.currentPiece;
            for (let r = 0; r < piece.matrix.length; r++) {
                for (let c = 0; c < piece.matrix[r].length; c++) {
                    if (piece.matrix[r][c] !== 0) {
                        drawNeonBlock(boardCtx, (piece.x + c) * blockW, (ghostY + r) * blockH, blockW, blockH, piece.color, piece.glow, true);
                    }
                }
            }
            boardCtx.restore();
        }
    }

    // 5. 현재 제어 중인 액티브 테트라미노 그리기
    if (GameState.currentPiece) {
        const piece = GameState.currentPiece;
        for (let r = 0; r < piece.matrix.length; r++) {
            for (let c = 0; c < piece.matrix[r].length; c++) {
                if (piece.matrix[r][c] !== 0) {
                    drawNeonBlock(boardCtx, (piece.x + c) * blockW, (piece.y + r) * blockH, blockW, blockH, piece.color, piece.glow);
                }
            }
        }
    }

    // 6. 특수 이펙트 파티클 실시간 연산 드로잉
    updateAndDrawParticles(boardCtx);

    // 7. 서브 패널 전원 리드로우 (넥스트, 홀드)
    drawSidePanels();
}

// 네온 블록 렌더링 세부 함수 (입체 광원 + 그라데이션)
function drawNeonBlock(ctx, x, y, w, h, color, glowColor, isGhost = false) {
    ctx.save();
    
    // 기본 테두리 모서리 깎기
    const pad = 1.5;
    const rx = x + pad;
    const ry = y + pad;
    const rw = w - pad * 2;
    const rh = h - pad * 2;

    if (isGhost) {
        // 고스트 피스는 테두리 단선선으로 처리해 시인성 향상
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(rx, ry, rw, rh);
    } else {
        // 일반 블록은 멋들어진 네온 그라데이션 광선 방출
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 8;

        const grad = ctx.createLinearGradient(rx, ry, rx + rw, ry + rh);
        grad.addColorStop(0, color);
        grad.addColorStop(1, adjustColorBrightness(color, -40)); // 깊이감 형성

        ctx.fillStyle = grad;
        ctx.fillRect(rx, ry, rw, rh);

        // 상단/좌측 하이라이트 경사 광선 추가 (고급 3D 느낌 가미)
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(rx, ry + rh);
        ctx.lineTo(rx, ry);
        ctx.lineTo(rx + rw, ry);
        ctx.stroke();
    }
    ctx.restore();
}

// 색상 밝기 필터 도우미
function adjustColorBrightness(hex, percent) {
    let R = parseInt(hex.substring(1, 3), 16);
    let G = parseInt(hex.substring(3, 5), 16);
    let B = parseInt(hex.substring(5, 7), 16);

    R = parseInt(R * (100 + percent) / 100);
    G = parseInt(G * (100 + percent) / 100);
    B = parseInt(B * (100 + percent) / 100);

    R = (R < 255) ? R : 255;
    G = (G < 255) ? G : 255;
    B = (B < 255) ? B : 255;

    const rHex = (R.toString(16).length === 1) ? "0" + R.toString(16) : R.toString(16);
    const gHex = (G.toString(16).length === 1) ? "0" + G.toString(16) : G.toString(16);
    const bHex = (B.toString(16).length === 1) ? "0" + B.toString(16) : B.toString(16);

    return "#" + rHex + gHex + bHex;
}

// 이펙트 파티클 루프 드로우
function updateAndDrawParticles(ctx) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.12; // 약한 중력 가중치
        p.alpha -= p.decay;

        if (p.alpha <= 0) {
            particles.splice(i, 1);
        } else {
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }
}

// 넥스트 & 홀드 패널 캔버스 드로잉
function drawSidePanels() {
    // 1. HOLD 그리기
    holdCtx.clearRect(0, 0, holdCanvas.width, holdCanvas.height);
    if (GameState.holdPiece) {
        drawPreviewPiece(holdCtx, GameState.holdPiece, holdCanvas.width, holdCanvas.height);
    }

    // 2. NEXT 3개 그리기
    nextCtx1.clearRect(0, 0, nextCanvas1.width, nextCanvas1.height);
    if (GameState.nextPieces[0]) {
        drawPreviewPiece(nextCtx1, GameState.nextPieces[0], nextCanvas1.width, nextCanvas1.height);
    }

    nextCtx2.clearRect(0, 0, nextCanvas2.width, nextCanvas2.height);
    if (GameState.nextPieces[1]) {
        drawPreviewPiece(nextCtx2, GameState.nextPieces[1], nextCanvas2.width, nextCanvas2.height);
    }

    nextCtx3.clearRect(0, 0, nextCanvas3.width, nextCanvas3.height);
    if (GameState.nextPieces[2]) {
        drawPreviewPiece(nextCtx3, GameState.nextPieces[2], nextCanvas3.width, nextCanvas3.height);
    }
}

// 프리뷰 패널 전 전용 블록 렌더링 콤팩트 함수
function drawPreviewPiece(ctx, type, width, height) {
    const info = SHAPES[type];
    const matrix = info.matrix;
    const rCount = matrix.length;
    const cCount = matrix[0].length;

    // 패널 가로세로 중앙 정렬을 위한 여백 오프셋 계산
    const gridBound = Math.max(rCount, cCount);
    const boxSize = Math.floor(width / (gridBound + 1.2));
    
    const startX = Math.floor((width - cCount * boxSize) / 2);
    const startY = Math.floor((height - rCount * boxSize) / 2);

    for (let r = 0; r < rCount; r++) {
        for (let c = 0; c < cCount; c++) {
            if (matrix[r][c] !== 0) {
                drawNeonBlock(ctx, startX + c * boxSize, startY + r * boxSize, boxSize, boxSize, info.color, info.glow);
            }
        }
    }
}

// 주 업데이트 엔진 루프
function update(time = 0) {
    if (GameState.gameOver || GameState.paused) return;

    const deltaTime = time - GameState.lastTime;
    GameState.lastTime = time;

    GameState.dropCounter += deltaTime;
    if (GameState.dropCounter >= GameState.dropInterval) {
        moveVertical();
    }

    drawAll();
    requestAnimationFrame(update);
}

// 게임오버 판정 처리
function triggerGameOver() {
    GameState.gameOver = true;
    AudioEngine.stopBGM();
    AudioEngine.playGameOver();
    
    document.getElementById('final-score').innerText = GameState.score;
    document.getElementById('final-level').innerText = GameState.level;
    document.getElementById('overlay-gameover').classList.remove('hidden');
}

// 게임 상태 초기화 및 재시작
function resetGame() {
    initBoard();
    GameState.score = 0;
    GameState.level = 1;
    GameState.lines = 0;
    GameState.nextPieces = [];
    GameState.holdPiece = null;
    GameState.hasHeld = false;
    GameState.gameOver = false;
    GameState.paused = false;
    GameState.dropInterval = 1000;
    GameState.dropCounter = 0;
    
    particles = [];

    // 스탯 초기 노출 갱신
    document.getElementById('stat-score').innerText = '0';
    document.getElementById('stat-level').innerText = '1';
    document.getElementById('stat-lines').innerText = '0';

    // UI 오버레이 정리
    document.getElementById('overlay-start').classList.add('hidden');
    document.getElementById('overlay-pause').classList.add('hidden');
    document.getElementById('overlay-gameover').classList.add('hidden');

    spawnNewPiece();
    resizeCanvas();
    
    // 오디오 동기화 및 자동 백그라운드 BGM 연동 실행
    if (AudioEngine.bgmEnabled) {
        AudioEngine.startBGM();
    }

    GameState.lastTime = performance.now();
    requestAnimationFrame(update);
}

// 일시정지 제어 전환
function togglePause() {
    if (GameState.gameOver) return;

    GameState.paused = !GameState.paused;
    if (GameState.paused) {
        AudioEngine.stopBGM();
        document.getElementById('overlay-pause').classList.remove('hidden');
    } else {
        document.getElementById('overlay-pause').classList.add('hidden');
        if (AudioEngine.bgmEnabled) {
            AudioEngine.startBGM();
        }
        GameState.lastTime = performance.now();
        requestAnimationFrame(update);
    }
}

// --- 입력 제어 맵핑 (키보드 대응) ---
window.addEventListener('keydown', event => {
    if (GameState.gameOver) return;

    // 포커싱이나 브라우저 기본 스크롤 동작 간섭 차단
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(event.code)) {
        event.preventDefault();
    }

    if (GameState.paused) {
        if (event.code === "Escape") {
            togglePause();
        }
        return;
    }

    switch (event.code) {
        case 'ArrowLeft':
            moveHorizontal(-1);
            break;
        case 'ArrowRight':
            moveHorizontal(1);
            break;
        case 'ArrowDown':
            moveVertical(); // 소프트드롭 가중치
            break;
        case 'ArrowUp':
            rotatePiece(1); // 시계방향 회전
            break;
        case 'KeyZ':
            rotatePiece(-1); // 반시계방향 회전
            break;
        case 'Space':
            hardDrop();
            break;
        case 'KeyC':
            triggerHold();
            break;
        case 'Escape':
            togglePause();
            break;
    }
});

// --- 입력 제어 맵핑 (모바일 터치 키패드 버튼 작동 바인딩) ---
document.getElementById('btn-game-start').addEventListener('click', () => {
    AudioEngine.init();
    resetGame();
});

document.getElementById('btn-restart').addEventListener('click', () => {
    resetGame();
});

document.getElementById('btn-pause').addEventListener('click', () => {
    togglePause();
});

document.getElementById('btn-resume').addEventListener('click', () => {
    togglePause();
});

document.getElementById('btn-restart-pause').addEventListener('click', () => {
    resetGame();
});

// 터치 키패드 입력 정교화 바인딩
document.getElementById('ctrl-left').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    moveHorizontal(-1);
});
document.getElementById('ctrl-right').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    moveHorizontal(1);
});
document.getElementById('ctrl-down').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    moveVertical();
});
document.getElementById('ctrl-rot-cw').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    rotatePiece(1);
});
document.getElementById('ctrl-rot-ccw').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    rotatePiece(-1);
});
document.getElementById('ctrl-hard').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    hardDrop();
});
document.getElementById('ctrl-hold').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    triggerHold();
});

// BGM & Mute 설정 제어
const btnMute = document.getElementById('btn-mute');
const btnBgm = document.getElementById('btn-bgm');

btnMute.addEventListener('click', () => {
    const isMuted = AudioEngine.toggleMute();
    if (isMuted) {
        document.getElementById('mute-icon').className = 'fas fa-volume-mute text-red-500';
    } else {
        document.getElementById('mute-icon').className = 'fas fa-volume-up text-white';
    }
});

btnBgm.addEventListener('click', () => {
    const isEnabled = AudioEngine.toggleBGM();
    if (isEnabled) {
        btnBgm.className = 'bg-indigo-600 border border-indigo-400 text-white p-2 rounded-xl transition duration-200';
    } else {
        btnBgm.className = 'bg-indigo-900/40 hover:bg-indigo-900/70 border border-indigo-500/30 text-indigo-300 p-2 rounded-xl transition duration-200';
    }
});

// 첫 화면 드로잉 준비
window.onload = function() {
    resizeCanvas();
    drawAll();
};
</script>
